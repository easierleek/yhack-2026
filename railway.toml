[build]
builder = "nixpacks"
buildCommand = "python3 -m venv /opt/venv && /opt/venv/bin/pip install -r requirements.txt && cd frontend/web && npm ci && npm run build"

[deploy]
startCommand = "/opt/venv/bin/python3 server.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
